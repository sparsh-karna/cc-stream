name: Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from GitHub UI

permissions:
  contents: write      # needed to push to gh-pages branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for git-committers plugin if added later

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install docs dependencies
        run: pip install "mkdocs>=1.6,<2.0" "mkdocs-material>=9.5" "mkdocstrings[python]>=0.25" ruff

      - name: Install package (so mkdocstrings can import cc_stream)
        run: pip install -e .

      - name: Build and deploy to GitHub Pages
        run: mkdocs gh-deploy --force --clean --verbose
