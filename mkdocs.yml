site_name: CC-Stream
site_description: >-
  CC-Stream: Collatz-ChaCha Hybrid Stream Cipher —
  a defense-in-depth post-quantum stream cipher.
site_url: https://cc-stream.dev
repo_url: https://github.com/sparshkarna/cc-stream
repo_name: cc-stream

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent:  indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent:  indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    logo: material/lock-outline
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            heading_level: 2
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            signature_crossrefs: true
            merge_init_into_class: true
            show_if_no_docstring: false
            filters:
              - "!^_"
              - "^__init__"

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - Security: security.md
  - CLI Reference: cli.md
  - API Reference:
      - Overview: api/index.md
      - CCStream (Cipher): api/cipher.md
      - Module 1 — Input: api/input-module.md
      - Module 2 — Salt Generator: api/salt-generator.md
      - Module 3 — Collatz Engine: api/collatz-engine.md
      - Module 4 — Parity Masker: api/parity-masker.md
      - Module 5 — Key Schedule: api/key-schedule.md
      - Module 6 — ChaCha20 Core: api/chacha20-core.md
      - Module 7 — Encryption: api/encryption.md
